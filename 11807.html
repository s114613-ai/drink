<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雄女飲料選擇模擬器 🦓</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Playfair+Display:wght@700;900&display=swap');

  :root {
    --red: #CC0000;
    --red-light: #E53030;
    --red-pale: #FFF0F0;
    --black: #1A1A1A;
    --white: #FAFAFA;
    --gray-light: #F2F2F2;
    --gray-mid: #CCCCCC;
    --pink-soft: #FFE0E8;
    --stripe1: #FFFFFF;
    --stripe2: #F5F5F5;
    --shadow: 0 4px 24px rgba(0,0,0,0.10);
    --shadow-hover: 0 8px 36px rgba(204,0,0,0.15);
    --radius: 18px;
    --radius-sm: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background-color: #F8F4F4;
    background-image:
      repeating-linear-gradient(
        135deg,
        transparent,
        transparent 36px,
        rgba(204,0,0,0.025) 36px,
        rgba(204,0,0,0.025) 72px
      );
    min-height: 100vh;
    color: var(--black);
  }

  /* ── HEADER ── */
  header {
    background: var(--black);
    color: var(--white);
    padding: 0;
    position: relative;
    overflow: hidden;
  }
  .header-stripe {
    height: 8px;
    background: repeating-linear-gradient(90deg, var(--red) 0px, var(--red) 20px, var(--black) 20px, var(--black) 40px);
  }
  .header-inner {
    padding: 28px 24px 32px;
    position: relative;
    z-index: 1;
  }
  .header-bg-text {
    position: absolute;
    top: -10px;
    right: -10px;
    font-family: 'Playfair Display', serif;
    font-size: 120px;
    font-weight: 900;
    color: rgba(255,255,255,0.04);
    pointer-events: none;
    user-select: none;
    line-height: 1;
  }
  .school-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--red);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 6vw, 44px);
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 8px;
  }
  header h1 span { color: var(--red-light); }
  .header-sub {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    font-weight: 400;
    letter-spacing: 0.5px;
  }
  .zebra-row {
    display: flex;
    height: 6px;
    overflow: hidden;
  }
  .zebra-row span {
    flex: 1;
  }
  .zebra-row span:nth-child(odd) { background: #fff; }
  .zebra-row span:nth-child(even) { background: var(--black); }

  /* ── MAIN LAYOUT ── */
  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 16px 60px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px 24px;
    margin-bottom: 20px;
    border: 1.5px solid rgba(204,0,0,0.07);
    transition: box-shadow 0.25s;
  }
  .card:hover { box-shadow: var(--shadow-hover); }

  .card-title {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 1.5px;
    background: linear-gradient(90deg, rgba(204,0,0,0.3), transparent);
  }

  /* ── SLIDER SECTION ── */
  .slider-group {
    margin-bottom: 24px;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 10px;
  }
  .slider-label-left {
    font-size: 15px;
    font-weight: 700;
    color: var(--black);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .slider-value-badge {
    background: var(--red);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 20px;
    min-width: 90px;
    text-align: center;
    transition: background 0.2s;
  }
  .slider-desc {
    font-size: 12px;
    color: #888;
    margin-top: 6px;
    min-height: 18px;
    transition: color 0.2s;
  }

  /* Range slider custom style */
  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 4px;
    outline: none;
    cursor: pointer;
    background: linear-gradient(90deg, var(--red) 0%, var(--red) var(--fill, 0%), var(--gray-mid) var(--fill, 0%), var(--gray-mid) 100%);
    transition: background 0.2s;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--red);
    box-shadow: 0 2px 8px rgba(204,0,0,0.25);
    transition: transform 0.15s, box-shadow 0.15s;
    cursor: grab;
  }
  input[type="range"]::-webkit-slider-thumb:active {
    transform: scale(1.2);
    cursor: grabbing;
    box-shadow: 0 4px 16px rgba(204,0,0,0.35);
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--white);
    border: 3px solid var(--red);
    box-shadow: 0 2px 8px rgba(204,0,0,0.25);
    cursor: grab;
  }

  /* Slider tick marks */
  .slider-ticks {
    display: flex;
    justify-content: space-between;
    padding: 0 4px;
    margin-top: 4px;
  }
  .slider-ticks span {
    font-size: 10px;
    color: var(--gray-mid);
    font-weight: 700;
  }
  .slider-ticks span.active { color: var(--red); }

  /* ── CHECKBOX ── */
  .checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: var(--pink-soft);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    cursor: pointer;
    transition: background 0.2s;
    border: 2px solid transparent;
  }
  .checkbox-group:hover { border-color: var(--red); background: #FFD6E0; }
  .checkbox-group input[type="checkbox"] { display: none; }
  .custom-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 6px;
    border: 2.5px solid var(--red);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    margin-top: 1px;
  }
  .custom-checkbox.checked {
    background: var(--red);
  }
  .custom-checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 13px;
    font-weight: 900;
  }
  .checkbox-label-text {
    font-size: 14px;
    font-weight: 700;
    color: var(--black);
    line-height: 1.4;
  }
  .checkbox-label-text small {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: #888;
    margin-top: 2px;
  }

  /* ── BUTTON ── */
  .btn-analyze {
    width: 100%;
    padding: 18px 24px;
    background: var(--red);
    color: white;
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 17px;
    font-weight: 900;
    letter-spacing: 3px;
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(204,0,0,0.35);
  }
  .btn-analyze::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }
  .btn-analyze:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(204,0,0,0.45);
    background: var(--red-light);
  }
  .btn-analyze:active { transform: translateY(0); }
  .btn-analyze:disabled {
    background: var(--gray-mid);
    box-shadow: none;
    cursor: not-allowed;
    transform: none;
  }

  /* ── LOADING ── */
  #loading-section {
    display: none;
  }
  .loading-card {
    background: var(--black);
    border-radius: var(--radius);
    padding: 36px 24px;
    text-align: center;
    color: white;
  }
  .radar-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    margin: 0 auto 20px;
  }
  .radar-circle {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 2px solid rgba(204,0,0,0.3);
    animation: radar-pulse 1.5s ease-out infinite;
  }
  .radar-circle:nth-child(2) { animation-delay: 0.5s; }
  .radar-circle:nth-child(3) { animation-delay: 1s; }
  @keyframes radar-pulse {
    0% { transform: scale(0.3); opacity: 1; border-color: rgba(204,0,0,0.8); }
    100% { transform: scale(1); opacity: 0; border-color: rgba(204,0,0,0); }
  }
  .radar-icon {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    animation: bounce-icon 0.6s ease-in-out infinite alternate;
  }
  @keyframes bounce-icon {
    from { transform: translateY(-4px); }
    to { transform: translateY(4px); }
  }
  .loading-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    color: rgba(255,255,255,0.9);
    margin-bottom: 8px;
  }
  .loading-marquee {
    font-size: 12px;
    color: var(--red-light);
    font-weight: 500;
    overflow: hidden;
    white-space: nowrap;
    position: relative;
  }
  .marquee-inner {
    display: inline-block;
    animation: marquee 3s linear infinite;
  }
  @keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
  }

  /* ── RESULT ── */
  #result-section { display: none; }

  .result-card {
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.12);
    animation: result-in 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes result-in {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .result-header {
    background: var(--black);
    color: white;
    padding: 20px 24px 16px;
    position: relative;
    overflow: hidden;
  }
  .result-header-bg {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 80px;
    opacity: 0.12;
    pointer-events: none;
  }
  .result-tag {
    display: inline-block;
    background: var(--red);
    color: white;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 3px 10px;
    border-radius: 4px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .result-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 900;
    line-height: 1.2;
  }
  .result-body {
    background: white;
    padding: 20px 24px;
  }
  .result-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }
  .meta-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--gray-light);
    border-radius: 8px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 700;
  }
  .meta-chip.price { background: #FFF3F3; color: var(--red); }
  .meta-chip.source-welfare { background: #E8F5E9; color: #2E7D32; }
  .meta-chip.source-shop { background: #E3F2FD; color: #1565C0; }
  .meta-chip.sugar { background: #FFF8E1; color: #E65100; }
  .meta-chip.topping { background: var(--pink-soft); color: #C2185B; }

  .result-comment {
    background: var(--red-pale);
    border-left: 4px solid var(--red);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 500;
    color: var(--black);
    font-style: italic;
    line-height: 1.5;
  }

  .error-card {
    background: white;
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    border: 2px dashed var(--red);
    box-shadow: var(--shadow);
    animation: result-in 0.4s ease forwards;
  }
  .error-emoji { font-size: 56px; margin-bottom: 12px; }
  .error-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--red);
    margin-bottom: 8px;
  }
  .error-msg { font-size: 14px; color: #666; line-height: 1.6; }

  /* ── BTN RETRY ── */
  .btn-retry {
    margin-top: 20px;
    width: 100%;
    padding: 14px;
    background: var(--gray-light);
    color: var(--black);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    font-weight: 700;
    border: 2px solid var(--gray-mid);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.2s;
    display: none;
  }
  .btn-retry:hover { border-color: var(--red); color: var(--red); background: var(--red-pale); }

  /* ── FOOTER ── */
  footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #BBB;
    letter-spacing: 1px;
  }
  footer strong { color: var(--red); }

  /* ── RWD ── */
  @media (max-width: 480px) {
    .card { padding: 20px 16px; }
    .result-body { padding: 16px; }
    .result-header { padding: 16px; }
  }
</style>
</head>

<header>
  <div class="header-stripe"></div>
  <div class="header-inner">
    <div class="header-bg-text">🦓</div>
    <div class="school-badge">🏫 高雄女中 × 飲料實驗室</div>
    <h1>雄女人<span>飲料</span><br>選擇模擬器</h1>
    <p class="header-sub">🥤 告別選擇困難，讓演算法替你決定今天喝什麼</p>
  </div>
  <div class="zebra-row">
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span><span></span>
  </div>
</header>

<div class="container">

  <!-- FORM CARD -->
  <div class="card" id="form-section">
    <div class="card-title">⚙️ 設定你的需求條件</div>

    <!-- Slider 1: 時間 -->
    <div class="slider-group">
      <div class="slider-label">
        <div class="slider-label-left">⏰ 距離下課時間</div>
        <div class="slider-value-badge" id="time-badge">快打鐘了！</div>
      </div>
      <input type="range" id="time-slider" min="1" max="5" value="1" step="1">
      <div class="slider-ticks">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
      </div>
      <div class="slider-desc" id="time-desc">🔔 快打鐘了！只剩 3 分鐘 → 限福利社飲料</div>
    </div>

    <!-- Slider 2: 預算 -->
    <div class="slider-group">
      <div class="slider-label">
        <div class="slider-label-left">💰 預算考量</div>
        <div class="slider-value-badge" id="budget-badge">$0–$15</div>
      </div>
      <input type="range" id="budget-slider" min="1" max="5" value="1" step="1">
      <div class="slider-ticks">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
      </div>
      <div class="slider-desc" id="budget-desc">🪙 銅板吃土價：$0–$15</div>
    </div>

    <!-- Slider 3: 含糖量 -->
    <div class="slider-group">
      <div class="slider-label">
        <div class="slider-label-left">🍬 含糖量（罪惡感）</div>
        <div class="slider-value-badge" id="sugar-badge">無糖 清聖</div>
      </div>
      <input type="range" id="sugar-slider" min="1" max="5" value="1" step="1">
      <div class="slider-ticks">
        <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span>
      </div>
      <div class="slider-desc" id="sugar-desc">🌿 無糖 (0g)：清清白白，健康滿分</div>
    </div>

    <!-- Checkbox -->
    <label class="checkbox-group" id="topping-label">
      <input type="checkbox" id="topping-check">
      <div class="custom-checkbox" id="custom-cb"></div>
      <div class="checkbox-label-text">
        🏃‍♀️ 剛上完體育課，我要加料咀嚼！
        <small>篩選條件將限定「有料」飲品（波霸/椰果/珍珠/仙草…）</small>
      </div>
    </label>

    <div style="height:24px"></div>

    <!-- Submit -->
    <button class="btn-analyze" id="btn-analyze" onclick="startAnalyze()">
      🔍 開始分析我的完美飲料
    </button>
  </div>

  <!-- LOADING -->
  <div id="loading-section">
    <div class="loading-card">
      <div class="radar-wrap">
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-circle"></div>
        <div class="radar-icon">🥤</div>
      </div>
      <div class="loading-text">飲料雷達掃描中…</div>
      <div class="loading-marquee">
        <span class="marquee-inner">📡 正在連接福利社資料庫　⟡　比對 50嵐菜單　⟡　計算最佳含糖曲線　⟡　評估荷包安全指數　⟡　即將完成…</span>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="result-section"></div>

  <button class="btn-retry" id="btn-retry" onclick="resetForm()">← 再算一次</button>

</div>

<footer>
  Made with ❤️ for <strong>高雄女中</strong> 雄女人 ·  僅供娛樂，飲料選擇後果自負 🦓
</footer>

};
const sugarLevels = {
  1: { badge: '無糖 清聖', desc: '🌿 無糖 (0g)：清清白白，健康滿分' },
  2: { badge: '微糖 有節操', desc: '🍃 微糖 (1~25g)：甜度的最低底線' },

// ── SLIDER INIT ──────────────────────────────────────────────────────────────
function updateSlider(slider, badgeId, descId, levels) {
  const val = parseInt(slider.value);
  const fill = ((val - 1) / 4 * 100).toFixed(1);
  slider.style.setProperty('--fill', fill + '%');
  document.getElementById(badgeId).textContent = levels[val].badge;
  document.getElementById(descId).textContent = levels[val].desc;
  // Update ticks
  const ticks = slider.closest('.slider-group').querySelectorAll('.slider-ticks span');
  ticks.forEach((t, i) => {
    t.classList.toggle('active', i + 1 <= val);
  });
}

const timeSlider = document.getElementById('time-slider');
const budgetSlider = document.getElementById('budget-slider');
const sugarSlider = document.getElementById('sugar-slider');

timeSlider.addEventListener('input', () => updateSlider(timeSlider, 'time-badge', 'time-desc', timeLevels));
budgetSlider.addEventListener('input', () => updateSlider(budgetSlider, 'budget-badge', 'budget-desc', budgetLevels));
sugarSlider.addEventListener('input', () => updateSlider(sugarSlider, 'sugar-badge', 'sugar-desc', sugarLevels));

// init
updateSlider(timeSlider, 'time-badge', 'time-desc', timeLevels);
updateSlider(budgetSlider, 'budget-badge', 'budget-desc', budgetLevels);
updateSlider(sugarSlider, 'sugar-badge', 'sugar-desc', sugarLevels);

// Checkbox
const toppingCheck = document.getElementById('topping-check');
const customCb = document.getElementById('custom-cb');
document.getElementById('topping-label').addEventListener('click', function(e) {
  if (e.target === this || e.target !== toppingCheck) {
    toppingCheck.checked = !toppingCheck.checked;
  }
  customCb.classList.toggle('checked', toppingCheck.checked);
});

// ── ANALYZE ─────────────────────────────────────────────────────────────────
function startAnalyze() {
  const timeVal = parseInt(timeSlider.value);
  const budgetVal = parseInt(budgetSlider.value);
  const sugarVal = parseInt(sugarSlider.value);
  const needTopping = toppingCheck.checked;

  // Hide form, show loading
  document.getElementById('form-section').style.display = 'none';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('loading-section').style.display = 'block';
  document.getElementById('btn-retry').style.display = 'none';

  setTimeout(() => {
    document.getElementById('loading-section').style.display = 'none';
    showResult(timeVal, budgetVal, sugarVal, needTopping);
  }, 1600);
}

function showResult(timeVal, budgetVal, sugarVal, needTopping) {
  const maxPrice = budgetLevels[budgetVal].max;
  const onlyWelfare = timeVal <= 2;

  let filtered = drinks.filter(d => {
    if (d.price > maxPrice) return false;
    if (onlyWelfare && d.source !== 'welfare') return false;
    if (needTopping && !d.hasTopping) return false;
    return true;
  });

  // Sugar matching: exact first, then allow ±1
  let candidates = filtered.filter(d => d.sugar === sugarVal);
  if (candidates.length === 0) {
    candidates = filtered.filter(d => Math.abs(d.sugar - sugarVal) === 1);
  }
  if (candidates.length === 0) {
    candidates = filtered; // fallback: ignore sugar
  }

  const resultSection = document.getElementById('result-section');
  resultSection.style.display = 'block';
  document.getElementById('btn-retry').style.display = 'block';

  if (candidates.length === 0) {
    // No match
    resultSection.innerHTML = `
      <div class="error-card">
        <div class="error-emoji">🚰</div>
        <div class="error-title">條件太嚴苛啦！</div>
        <div class="error-msg">
          學妹，你的需求讓演算法陷入了存在危機…<br>
          建議你去喝飲水機的白開水，免費又健康！<br><br>
          <small>（試試放寬預算或取消加料限制？）</small>
        </div>
      </div>`;
    return;
  }

  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  const sourceName = pick.source === 'welfare' ? '🏫 福利社' : '🧋 50嵐';
  const sourceClass = pick.source === 'welfare' ? 'source-welfare' : 'source-shop';
  const sugarLabel = ['', '無糖', '微糖', '半糖', '少糖', '全糖'][pick.sugar] || '未知';
  const sugarEmoji = ['', '🌿', '🍃', '🍵', '🍬', '🤤'][pick.sugar] || '';

  resultSection.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-header-bg">${pick.emoji}</div>
        <div class="result-tag">✨ 演算法選定</div>
        <div class="result-name">${pick.name}</div>
      </div>
      <div class="result-body">
        <div class="result-meta">
          <div class="meta-chip price">💰 $${pick.price}</div>
          <div class="meta-chip ${sourceClass}">${sourceName}</div>
          <div class="meta-chip sugar">${sugarEmoji} ${sugarLabel}</div>
          ${pick.hasTopping ? '<div class="meta-chip topping">🧊 有加料</div>' : ''}
        </div>
        <div class="result-comment">「${pick.comment}」</div>
      </div>
    </div>`;
}

function resetForm() {
  document.getElementById('form-section').style.display = 'block';
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('btn-retry').style.display = 'none';
  // reset sliders to default
  timeSlider.value = 1;
  budgetSlider.value = 1;
  sugarSlider.value = 1;
  toppingCheck.checked = false;
  customCb.classList.remove('checked');
  updateSlider(timeSlider, 'time-badge', 'time-desc', timeLevels);
  updateSlider(budgetSlider, 'budget-badge', 'budget-desc', budgetLevels);
  updateSlider(sugarSlider, 'sugar-badge', 'sugar-desc', sugarLevels);
}
